<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3efe5" />
    <meta
      name="description"
      content="Каталог комиксов, обсуждавшихся в подкасте «На Панелях»."
    />
    <title>На Панелях — Комиксы</title>
    <link rel="icon" type="image/png" href="/assets/avatar.png" />
    <link rel="apple-touch-icon" href="/assets/avatar.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260628" />
  </head>
  <body>
    <main class="page-shell">
      <header class="hero hero--compact">
        <div class="hero__eyebrow">Каталог обзоров</div>
        <div class="hero__title-row">
          <h1><span>На Панелях</span><br />Комиксы</h1>
          <img
            class="hero__mark"
            src="/assets/avatar.png"
            alt="Логотип подкаста «На Панелях»"
          />
        </div>
        <p class="hero__intro">
          Что и в каких выпусках обсуждали
        </p>
        <nav class="site-nav" aria-label="Разделы сайта">
          <a class="site-nav__link" href="/">Календарь</a>
          <a class="site-nav__link is-active" href="/comics">Комиксы</a>
        </nav>
      </header>

      <section class="stats-grid stats-grid--comics" aria-label="Статистика каталога">
        <article class="stat panel">
          <span class="stat__label">Комиксов</span>
          <strong id="stat-comics">—</strong>
          <span>уникальных названий</span>
        </article>
        <article class="stat panel">
          <span class="stat__label">Проверено</span>
          <strong id="stat-verified">—</strong>
          <span>записей с источниками по рану</span>
        </article>
      </section>

      <section class="panel controls comics-controls" aria-labelledby="catalog-title">
        <div class="controls__topline">
          <div>
            <p class="kicker">Справочник</p>
            <h2 id="catalog-title">Обозреваемые комиксы</h2>
          </div>
          <label class="search-wrap">
            <span>Поиск</span>
            <input id="comic-search" type="search" placeholder="Название, автор, выпуск" />
          </label>
        </div>

        <div class="filter-grid">
          <label class="select-wrap">
            <span>Формат</span>
            <select id="podcast-filter" aria-label="Фильтр по формату"></select>
          </label>
          <label class="select-wrap">
            <span>Издательство</span>
            <select id="publisher-filter" aria-label="Фильтр по издательству"></select>
          </label>
          <label class="select-wrap">
            <span>Десятилетие</span>
            <select id="decade-filter" aria-label="Фильтр по десятилетию"></select>
          </label>
          <label class="select-wrap">
            <span>Заявитель</span>
            <select id="proposer-filter" aria-label="Фильтр по заявителю"></select>
          </label>
        </div>
      </section>

      <section class="catalog-layout" aria-live="polite">
        <div id="active-comic-filters" class="active-filters" hidden></div>
        <div id="comic-list" class="comic-list"></div>
      </section>

      <footer class="footer">
        <p>
          Данные выпусков:
          <a
            href="https://docs.google.com/spreadsheets/d/1xlG146EJ3go3MDKndnvd5OVVWj8adZmKCKaWjn3FF3Y/edit?gid=0#gid=0"
            target="_blank"
            rel="noreferrer"
            >публичная таблица</a
          >.
        </p>
      </footer>
    </main>

    <script src="/data/comics.js"></script>
    <script type="module" src="/comics.js?v=20260628"></script>
  </body>
</html>
